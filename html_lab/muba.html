<!DOCTYPE html>
<html lang="en">
<head>
    
    <title> - Profile</title>
    <style>
        body {
            /* Soft pink background with a subtle floral repeat pattern */
            background-color: #ffe4e1; 
            background-image: url('https://www.transparenttextures.com/patterns/ flowers.png'); /* A subtle flower texture */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%; /* Makes it circular */
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            color: #d147a3; /* A deeper pink/berry color */
            margin-bottom: 10px;
        }

        .links a {
            text-decoration: none;
            color: #fff;
            background-color: #d147a3;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            display: inline-block;
            transition: 0.3s;
        }

        .links a:hover {
            background-color: #a63682;
            transform: translateY(-2px);
        }

        .education-section {
            background: rgba(255, 255, 255, 0.7); /* Semi-transparent white */
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            width: 80%;
            max-width: 600px;
        }

        .school-logo {
            width: 80px;
            height: auto;
            margin: 10px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .skills-list {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .skills-list li {
            background: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid #ffb6c1;
            font-weight: bold;
            color: #d147a3;
        }
    </style>
</head>
<body>

    <img class="profile-pic" src="02a47e2a-5d25-45dd-b4a2-f275d446cf6a.jpg" >
    
    <h1>Hello.. I'm Tasnim E Mubashira</h1>
    <p>Computer Science and Engineering Student at <strong>UAP</strong></p>
    
    <div class="links">
        
        <a href="https://www.facebook.com/share/1GCZwLzV4B/" target="_blank">Facebook</a>
    </div>

    <div class="education-section">
        <h3>My Education</h3>
        
        <p><strong>College:</strong> Mohammadpur Preparatory School & College</p>
        <img class="school-logo" src="download.png" alt="Mohammadpur Preparatory Logo">

        <p><strong>School:</strong> Shaheed Police Smrity College</p>
        <img class="school-logo" src="download.png" alt="Shaheed Police Smrity Logo">
    </div>

    <h2 style="margin-top: 40px; color: #d147a3;">Languages & Technologies</h2>
    <ul class="skills-list">
        <li>C++</li>
        <li>Java</li>
        <li>Python</li>
        <li>HTML</li>
        <li>CSS</li>
    </ul>

</body>
</html>
